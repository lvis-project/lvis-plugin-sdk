name: test

on:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'vitest.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/test.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'vitest.config.ts'
      - 'tsconfig*.json'
  workflow_dispatch: {}

concurrency:
  group: test-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.repository == 'lvis-project/lvis-plugin-sdk'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.38'
      - run: bun install --frozen-lockfile
      - run: bun run test
      - name: Typecheck
        run: bunx tsc --noEmit
