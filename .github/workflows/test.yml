name: test

on:
  pull_request:
    paths:
      - 'src/**'
      - 'dist/**'
      - '__tests__/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsup.config.ts'
      - 'vitest.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/test.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'dist/**'
      - '__tests__/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsup.config.ts'
      - 'vitest.config.ts'
      - 'tsconfig*.json'
  workflow_dispatch: {}

# Drop the workflow's default GITHUB_TOKEN scope to read-only — neither
# `bun run test` nor the build step needs to write back. Matches the
# precedent set by drift-check.yml.
permissions:
  contents: read

concurrency:
  group: test-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.repository == 'lvis-project/lvis-plugin-sdk'
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to match drift-check.yml — supply-chain hardening for
      # third-party actions. Update both files together when bumping versions.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: '1.1.38'
      - run: bun install --frozen-lockfile
      - run: bun run test
      - name: Typecheck
        run: bunx tsc --noEmit
      # dist/ IS committed to Git and gated. Consumers install via
      # `github:lvis-project/lvis-plugin-sdk#vX.Y.Z`, and bun does NOT run a
      # `prepare` script for `github:` dependencies (security policy) — there
      # is no prepare script here anyway — so tag consumers load the committed
      # dist verbatim. This step rebuilds and fails if the committed dist is
      # stale vs src, so a src-only PR that forgot to rebuild cannot ship
      # outdated JS to tag consumers. It also smoke-tests that the build emits
      # cleanly (a broken build fails the rebuild). See `.gitignore`'s dist
      # rationale and `scripts/check-dist-drift.mjs`.
      - name: Check committed dist is in sync with src
        run: bun run check:dist-drift
