name: drift-check
on:
  schedule:
    - cron: '17 3 * * *'   # nightly ~03:17 UTC
  workflow_dispatch: {}
concurrency:
  group: drift-check
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
      - name: Checkout host repo (private)
        uses: actions/checkout@v4
        with:
          repository: lvis-project/lvis-app
          token: ${{ secrets.HOST_READ_TOKEN }}
          path: .host
          sparse-checkout: |
            src/plugins/types.ts
          sparse-checkout-cone-mode: false
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.38'
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run sync against host types
        env:
          LVIS_HOST_TYPES_PATH: ${{ github.workspace }}/.host/src/plugins/types.ts
        run: node scripts/sync-from-host.mjs
      - name: Check for drift
        id: diff
        run: |
          if git diff --quiet -- src/index.ts; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open PR on drift
        if: steps.diff.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/auto-drift-sync
          title: 'chore: auto-sync types from host SoT'
          commit-message: 'chore: auto-sync types from host SoT'
          body: |
            Nightly drift-check detected divergence between `lvis-app/src/plugins/types.ts` and this SDK.
            Auto-regenerated via `scripts/sync-from-host.mjs`.

            Please review the diff in `src/index.ts` before merging.
          base: main
          delete-branch: true
      - name: Fail-soft alert on error
        if: failure()
        run: |
          echo "::warning::drift-check failed — consider adding issue creation step"
