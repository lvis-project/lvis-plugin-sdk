name: drift-check
on:
  pull_request:
    paths:
      - 'src/index.ts'
      - 'schemas/plugin-manifest.schema.json'
      - 'scripts/sync-from-host.mjs'
      - 'scripts/sync-schema-from-host.mjs'
      - '.github/workflows/drift-check.yml'
  schedule:
    - cron: '17 3 * * *'   # nightly ~03:17 UTC
  workflow_dispatch: {}
concurrency:
  group: drift-check-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    if: github.repository == 'lvis-project/lvis-plugin-sdk'
    # pull_request runs on a GitHub-hosted runner to avoid executing
    # PR-controlled code (bun install + node script) on the self-hosted
    # Oracle machine. schedule/workflow_dispatch use the self-hosted runner.
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","arm64","oracle"]') }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout SDK
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Generate host-read App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: lvis-project
          repositories: lvis-app
      - name: Checkout host repo (private)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: lvis-project/lvis-app
          token: ${{ steps.app-token.outputs.token }}
          path: .host
          sparse-checkout: |
            src/plugins
            schemas
          sparse-checkout-cone-mode: true
      - name: Ensure host schema file is present
        # sparse-checkout cone mode occasionally omits schemas/ on ubuntu-latest.
        # The git objects ARE downloaded (depth=1 clone has full HEAD tree), so
        # we can restore the file directly from the object store.
        run: |
          if [ ! -f .host/schemas/plugin.schema.json ]; then
            echo "sparse-checkout missed schemas/ — restoring from git objects"
            git -C .host restore schemas/plugin.schema.json
          fi
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: '1.1.38'
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run sync against host types
        env:
          LVIS_HOST_TYPES_PATH: ${{ github.workspace }}/.host/src/plugins/types.ts
          LVIS_HOST_REPO_URL: https://github.com/lvis-project/lvis-app.git
        run: node scripts/sync-from-host.mjs
      - name: Run schema sync against host plugin.schema.json (US-A1)
        env:
          LVIS_HOST_SCHEMA_PATH: ${{ github.workspace }}/.host/schemas/plugin.schema.json
          LVIS_HOST_REPO_URL: https://github.com/lvis-project/lvis-app.git
        run: node scripts/sync-schema-from-host.mjs
      # Architect post-merge follow-up M14 — running each sync script a
      # second time against the same host source MUST produce the same
      # output. Without this guarantee the JSDoc-strip + re-injection
      # passes can oscillate (the original PR #62 root cause).
      - name: Verify sync scripts are idempotent (M14)
        env:
          LVIS_HOST_TYPES_PATH: ${{ github.workspace }}/.host/src/plugins/types.ts
          LVIS_HOST_SCHEMA_PATH: ${{ github.workspace }}/.host/schemas/plugin.schema.json
        run: |
          set -euo pipefail
          cp src/index.ts /tmp/index-after-first-run.ts
          cp schemas/plugin-manifest.schema.json /tmp/schema-after-first-run.json
          node scripts/sync-from-host.mjs
          node scripts/sync-schema-from-host.mjs
          if ! diff -u /tmp/index-after-first-run.ts src/index.ts; then
            echo "::error::sync-from-host.mjs is not idempotent — second run produced different output"
            exit 1
          fi
          if ! diff -u /tmp/schema-after-first-run.json schemas/plugin-manifest.schema.json; then
            echo "::error::sync-schema-from-host.mjs is not idempotent — second run produced different output"
            exit 1
          fi
      - name: Remove host checkout
        run: rm -rf .host
      - name: Check for drift
        id: diff
        run: |
          if git diff --quiet -- src/index.ts schemas/plugin-manifest.schema.json; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Fail on drift (PR mode)
        if: github.event_name == 'pull_request' && steps.diff.outputs.drift == 'true'
        run: |
          echo "::error::Drift detected between SDK and host SoT (types.ts and/or plugin.schema.json). Run 'bun run sync:from-host && bun run sync:schema-from-host' locally and commit the result."
          git --no-pager diff -- src/index.ts schemas/plugin-manifest.schema.json | head -300
          exit 1
      - name: Open PR on drift
        if: github.event_name != 'pull_request' && steps.diff.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/auto-drift-sync
          title: 'chore: auto-sync types + schema from host SoT'
          commit-message: 'chore: auto-sync types + schema from host SoT'
          body: |
            Nightly drift-check detected divergence between `lvis-app` and this SDK.
            Auto-regenerated via `scripts/sync-from-host.mjs` and
            `scripts/sync-schema-from-host.mjs` (US-A1).

            Please review the diffs in `src/index.ts` and
            `schemas/plugin-manifest.schema.json` before merging.
          base: main
          delete-branch: true
      - name: Open issue on workflow failure
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const title = `drift-check failed on ${context.sha.slice(0,7)}`;
            const body = `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nLikely causes:\n- HOST_READ_TOKEN expired/revoked\n- Host repo types.ts moved\n- Network or checkout failure`;
            await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['ci','drift-check'] });
