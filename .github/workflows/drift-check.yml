name: drift-check
on:
  pull_request:
    paths:
      - 'src/index.ts'
      - 'src/ui/tokens/index.ts'
      - 'src/ui/tokens/theme-bundles.ts'
      - 'scripts/sync-from-host.mjs'
      - '.github/workflows/drift-check.yml'
  schedule:
    - cron: '17 3 * * *'   # nightly ~03:17 UTC
  workflow_dispatch: {}
concurrency:
  group: drift-check-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    if: github.repository == 'lvis-project/lvis-plugin-sdk'
    # pull_request runs on a GitHub-hosted runner to avoid executing
    # PR-controlled code (bun install + node script) on the self-hosted
    # Oracle machine. schedule/workflow_dispatch use the self-hosted runner.
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","arm64","oracle"]') }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout SDK
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Checkout host repo (public)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: lvis-project/lvis-app
          # Pin the contract source to the host production branch.
          ref: main
          path: .host
          fetch-depth: 1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: '1.1.38'
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run sync against host types
        env:
          LVIS_HOST_TYPES_PATH: ${{ github.workspace }}/.host/src/plugins/types.ts
          LVIS_HOST_REPO_URL: https://github.com/lvis-project/lvis-app.git
        run: node scripts/sync-from-host.mjs
      # The second run must produce byte-identical output across ALL regenerated
      # targets, guarding against oscillating JSDoc-strip / token passes that
      # would otherwise flap drift-check on every PR.
      - name: Verify sync-from-host is idempotent
        env:
          LVIS_HOST_TYPES_PATH: ${{ github.workspace }}/.host/src/plugins/types.ts
        run: |
          set -euo pipefail
          for f in src/index.ts src/ui/tokens/index.ts src/ui/tokens/theme-bundles.ts; do
            cp "$f" "/tmp/$(echo "$f" | tr '/' '_').firstrun"
          done
          node scripts/sync-from-host.mjs
          for f in src/index.ts src/ui/tokens/index.ts src/ui/tokens/theme-bundles.ts; do
            if ! diff -u "/tmp/$(echo "$f" | tr '/' '_').firstrun" "$f"; then
              echo "::error::sync-from-host.mjs is not idempotent — second run produced different output for $f"
              exit 1
            fi
          done
      - name: Remove host checkout
        run: rm -rf .host
      - name: Check for drift
        id: diff
        run: |
          # Cover every file sync-from-host.mjs regenerates, not just
          # src/index.ts. A host-side change to plugin-ui-tokens.ts or
          # theme-bundles.ts that the SDK author forgets to regenerate would
          # otherwise pass green and ship a stale token contract to plugins.
          if git diff --quiet -- src/index.ts src/ui/tokens/index.ts src/ui/tokens/theme-bundles.ts; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Fail on drift (PR mode)
        if: github.event_name == 'pull_request' && steps.diff.outputs.drift == 'true'
        run: |
          echo "::error::Drift detected between SDK and host SoT. Run 'bun run sync:from-host' locally and commit the result."
          git --no-pager diff -- src/index.ts src/ui/tokens/index.ts src/ui/tokens/theme-bundles.ts | head -300
          exit 1
      - name: Open PR on drift
        if: github.event_name != 'pull_request' && steps.diff.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/auto-drift-sync
          title: 'chore: auto-sync from host SoT (types + tokens)'
          commit-message: 'chore: auto-sync from host SoT (types + tokens)'
          body: |
            Nightly drift-check detected divergence between `lvis-app` and this SDK.
            Auto-regenerated via `scripts/sync-from-host.mjs`.

            Please review the diffs in `src/index.ts`, `src/ui/tokens/index.ts`,
            and `src/ui/tokens/theme-bundles.ts` before merging.
          base: main
          delete-branch: true
      - name: Open issue on workflow failure
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const title = `drift-check failed on ${context.sha.slice(0,7)}`;
            const body = `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nLikely causes:\n- HOST_READ_TOKEN expired/revoked\n- Host repo types.ts moved\n- Network or checkout failure`;
            await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['ci','drift-check'] });
