name: validate-plugin-manifests

# Fetch each active plugin's `plugin.json` via the GitHub API and validate
# it against the SDK's current `schemas/plugin-manifest.schema.json` using
# ajv-cli. Catches the "SDK schema tightened, plugin manifest still has the
# old shape" class of break.
#
# Runs on every PR that touches the SDK schema, on push to main, and
# nightly so a plugin-side merge that drifts from the SDK schema gets
# noticed within 24h instead of at the next plugin release.
#
# Matrix invariant: every entry MUST be a current, reachable plugin repo.
# A renamed/archived/deleted repo returns 404 and FAILS the job (see the
# "Gate token failure" step) so a future rename surfaces loudly here rather
# than silently dropping a plugin from validation. This is distinct from the
# legitimate "GitHub App not yet installed on a real repo" skip.

on:
  pull_request:
    paths:
      - 'schemas/plugin-manifest.schema.json'
      - 'scripts/sync-schema-from-host.mjs'
      - '.github/workflows/validate-plugin-manifests.yml'
  push:
    branches: [main]
    paths:
      - 'schemas/plugin-manifest.schema.json'
  schedule:
    - cron: '37 4 * * *' # nightly ~04:37 UTC, after drift-check (03:17)
  workflow_dispatch: {}

concurrency:
  group: validate-plugin-manifests-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.repository == 'lvis-project/lvis-plugin-sdk'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - lvis-plugin-meeting
          - lvis-plugin-local-indexer
          - lvis-plugin-ms-graph
          - lvis-plugin-lge-api
          - lvis-plugin-work-assistant
          - lvis-plugin-template
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v6

      # `continue-on-error: true` lets the next step inspect the outcome and
      # decide between two very different 404 causes:
      #   1. The repo was renamed / archived / deleted (matrix is stale) —
      #      this MUST fail the job so the rename surfaces here loudly.
      #   2. The backing GitHub App is genuinely not yet installed on an
      #      existing repo (org-admin one-time action) — tolerated only when
      #      the repo is on the explicit APP_PENDING_REPOS allow-list below.
      # A bare 404 with the repo NOT on the allow-list fails (no silent skip).
      - name: Generate read token for plugin repo
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: lvis-project
          repositories: ${{ matrix.plugin }}

      # Explicit, reviewed allow-list of repos where the App install is known
      # to be pending. Keep EMPTY in steady state: every active plugin repo
      # should have the App installed, so an unexpected token failure is a
      # stale-matrix (renamed/archived/deleted) signal and must fail. To
      # tolerate a genuinely-pending install, add the exact repo name here in
      # a reviewed PR — never widen this to a blanket skip.
      - name: Gate token failure (fail on stale matrix, allow only pending installs)
        if: steps.app-token.outcome != 'success'
        env:
          APP_PENDING_REPOS: ''
          PLUGIN: ${{ matrix.plugin }}
        run: |
          set -euo pipefail
          for allowed in $APP_PENDING_REPOS; do
            if [ "$allowed" = "$PLUGIN" ]; then
              echo "::warning title=GitHub App install pending::HOST_READ_TOKEN App is not yet installed on lvis-project/${PLUGIN} (explicitly allow-listed) — manifest validation skipped. Install the App via org settings, then remove it from APP_PENDING_REPOS."
              exit 0
            fi
          done
          echo "::error title=Plugin repo unreachable::Could not mint a read token for lvis-project/${PLUGIN}. The repo is renamed, archived, or deleted (stale matrix), or the GitHub App is not installed and the repo is not on APP_PENDING_REPOS. Update strategy.matrix.plugin or the allow-list."
          exit 1

      - name: Fetch plugin.json from ${{ matrix.plugin }}@main
        if: steps.app-token.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # Plugins keep `plugin.json` at the repo root. Use the contents API
          # so we don't have to clone the whole plugin repo just to read one
          # file. The API returns base64-encoded content.
          gh api \
            "repos/lvis-project/${{ matrix.plugin }}/contents/plugin.json?ref=main" \
            --jq '.content' \
            | base64 --decode > plugin.json
          echo "::group::plugin.json"
          cat plugin.json
          echo "::endgroup::"

      - name: Install ajv-cli
        if: steps.app-token.outcome == 'success'
        run: npm install --no-save ajv-cli@5 ajv-formats@2

      - name: Validate plugin.json against SDK schema
        if: steps.app-token.outcome == 'success'
        run: |
          set -euo pipefail
          npx ajv-cli validate \
            --spec=draft7 \
            --strict=false \
            -c ajv-formats \
            -s schemas/plugin-manifest.schema.json \
            -d plugin.json

      - name: Open issue on validation failure (nightly only)
        if: failure() && github.event_name == 'schedule' && steps.app-token.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const title = `validate-plugin-manifests: ${{ matrix.plugin }} drift`;
            const body =
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
              `\`${{ matrix.plugin }}\`'s \`plugin.json\` no longer validates against the SDK schema. ` +
              `Either bump the plugin to fix the manifest or update the SDK schema if the contract intentionally changed.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'plugin-manifest-drift'],
            });
